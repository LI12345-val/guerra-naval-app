name: Compilar APK de Guerra Naval

on:
  workflow_dispatch:   # esto agrega el botón "Run workflow" en la pestaña Actions

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configurar Java (necesario para compilar Android)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Instalar Flet
        run: pip install flet==0.85.3

      - name: Compilar el APK
        run: flet build apk

      - name: Subir el APK como archivo descargable
        uses: actions/upload-artifact@v4
        with:
          name: guerra-naval-apk
          path: build/apk/*.apk
